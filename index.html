<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscripción Laboratorio 2026</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Navegación */
        nav {
            background: white;
            border-radius: 10px;
            padding: 15px 25px;
            margin-bottom: 30px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        nav a {
            color: #667eea;
            text-decoration: none;
            font-weight: bold;
            padding: 8px 15px;
            border-radius: 5px;
            transition: all 0.3s;
        }

        nav a:hover {
            background: #667eea;
            color: white;
        }

        /* Tarjetas */
        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .card h2 {
            color: #667eea;
            margin-bottom: 20px;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
        }

        /* Formularios */
        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #333;
        }

        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: transform 0.2s;
        }

        button:hover {
            transform: scale(1.02);
        }

        .mensaje {
            margin-top: 15px;
            padding: 10px;
            border-radius: 5px;
        }

        .exito {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        /* Tabla de alumnos */
        .tabla-alumnos {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }

        th {
            background: #f8f9fa;
            color: #667eea;
        }

        tr:hover {
            background: #f5f5f5;
        }

        .cargando {
            text-align: center;
            padding: 20px;
            color: #666;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Menú de navegación -->
    <nav>
        <a href="index.html">🏠 Inicio</a>
        <a href="registro.html">📝 Registrar Alumno</a>
        <a href="turnos.html">📅 Gestionar Turnos</a>
    </nav>

    <!-- Título principal -->
    <div class="card">
        <h1>🧪 Sistema de Inscripción - Laboratorio 2026</h1>
        <p>Bienvenido al sistema de gestión de turnos y alumnos del laboratorio.</p>
    </div>

    <!-- ========== FORMULARIO DE REGISTRO DE ALUMNOS (PASO 3) ========== -->
    <div class="card">
        <h2>📝 Registrar Nuevo Alumno</h2>
        <form id="formRegistroAlumno">
            <div class="form-group">
                <label>Nombre *</label>
                <input type="text" id="nombre" placeholder="Ej: Juan" required>
            </div>
            <div class="form-group">
                <label>Apellido *</label>
                <input type="text" id="apellido" placeholder="Ej: Pérez" required>
            </div>
            <div class="form-group">
                <label>Email *</label>
                <input type="email" id="email" placeholder="ejemplo@mail.com" required>
            </div>
            <div class="form-group">
                <label>Teléfono *</label>
                <input type="tel" id="telefono" placeholder="Ej: 3425551234" required>
            </div>
            <div class="form-group">
                <label>Nivel *</label>
                <select id="nivel" required>
                    <option value="">Seleccionar nivel</option>
                    <option value="Inicial">Inicial</option>
                    <option value="Intermedio">Intermedio</option>
                    <option value="Avanzado">Avanzado</option>
                </select>
            </div>
            <button type="submit">✅ Registrar Alumno</button>
        </form>
        <div id="mensajeRegistro" class="mensaje"></div>
    </div>

    <!-- ========== LISTA DE ALUMNOS REGISTRADOS ========== -->
    <div class="card">
        <h2>📋 Alumnos Registrados</h2>
        <div class="tabla-alumnos">
            <div id="listaAlumnos" class="cargando">Cargando alumnos...</div>
        </div>
    </div>
</div>

<script type="module">
    // Importar funciones de Firebase
    import { 
        registrarAlumno, 
        cargarAlumnos 
    } from './js/conexion.js';
    
    // ========== REGISTRAR ALUMNO ==========
    const formRegistro = document.getElementById('formRegistroAlumno');
    const mensajeDiv = document.getElementById('mensajeRegistro');
    
    if (formRegistro) {
        formRegistro.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Limpiar mensaje anterior
            mensajeDiv.innerHTML = '';
            
            // Obtener datos del formulario
            const datos = {
                nombre: document.getElementById('nombre').value.trim(),
                apellido: document.getElementById('apellido').value.trim(),
                email: document.getElementById('email').value.trim(),
                telefono: document.getElementById('telefono').value.trim(),
                nivel: document.getElementById('nivel').value
            };
            
            // Validar campos
            if (!datos.nombre || !datos.apellido || !datos.email || !datos.telefono || !datos.nivel) {
                mensajeDiv.innerHTML = '<div class="error">❌ Por favor, completá todos los campos</div>';
                return;
            }
            
            // Mostrar mensaje de carga
            mensajeDiv.innerHTML = '<div class="cargando">⏳ Registrando alumno...</div>';
            
            // Registrar en Firebase
            const resultado = await registrarAlumno(datos);
            
            if (resultado.success) {
                mensajeDiv.innerHTML = '<div class="exito">✅ ¡Alumno registrado correctamente!</div>';
                formRegistro.reset();
                // Recargar la lista de alumnos
                mostrarListaAlumnos();
            } else {
                mensajeDiv.innerHTML = `<div class="error">❌ Error: ${resultado.error}</div>`;
            }
        });
    }
    
    // ========== MOSTRAR LISTA DE ALUMNOS ==========
    async function mostrarListaAlumnos() {
        const contenedor = document.getElementById('listaAlumnos');
        if (!contenedor) return;
        
        contenedor.innerHTML = '<div class="cargando">📚 Cargando alumnos...</div>';
        
        const alumnos = await cargarAlumnos();
        
        if (!alumnos || alumnos.length === 0) {
            contenedor.innerHTML = '<p>📭 No hay alumnos registrados aún.</p>';
            return;
        }
        
        let html = `<table>
            <thead>
                <tr>
                    <th>Nombre Completo</th>
                    <th>Email</th>
                    <th>Teléfono</th>
                    <th>Nivel</th>
                    <th>Fecha Registro</th>
                </tr>
            </thead>
            <tbody>
        `;
        
        alumnos.forEach(alumno => {
            const fecha = alumno.fechaRegistro ? new Date(alumno.fechaRegistro).toLocaleDateString('es-AR') : 'N/A';
            html += `<tr>
                <td>${alumno.nombreCompleto || alumno.nombre + ' ' + alumno.apellido}</td>
                <td>${alumno.email || '-'}</td>
                <td>${alumno.telefono || '-'}</td>
                <td>${alumno.nivel || '-'}</td>
                <td>${fecha}</td>
            </tr>`;
        });
        
        html += `</tbody>
                </table>`;
        contenedor.innerHTML = html;
    }
    
    // Cargar alumnos al iniciar la página
    mostrarListaAlumnos();
</script>

</body>
</html>
