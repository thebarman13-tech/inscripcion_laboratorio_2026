<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DR TECNO · Material de Estudio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: background-color 0.3s, color 0.3s;
        }

        :root {
            --bg-color: #F5F7FA;
            --card-bg: #ffffff;
            --text-color: #1a202c;
            --text-light: #4a5568;
            --navbar-bg: #ffffff;
            --border-color: #e2e8f0;
            --shadow: 0 10px 25px rgba(0,0,0,0.1);
            --primary: #005B9F;
            --primary-dark: #003B6F;
            --secondary: #00A3E0;
            --accent: #F15A24;
            --success: #28a745;
            --error: #dc3545;
            --warning: #ffc107;
        }

        body.dark {
            --bg-color: #1a202c;
            --card-bg: #2d3748;
            --text-color: #f7fafc;
            --text-light: #cbd5e0;
            --navbar-bg: #2d3748;
            --border-color: #4a5568;
            --shadow: 0 10px 25px rgba(0,0,0,0.3);
            --primary: #00A3E0;
            --primary-dark: #005B9F;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
        }

        .navbar {
            background-color: var(--navbar-bg);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            box-shadow: var(--shadow);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .logo-img {
            height: 40px;
            width: auto;
            max-width: 150px;
            object-fit: contain;
        }

        .logo span {
            color: var(--accent);
        }

        .nav-links {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            align-items: center;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-color);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            transition: all 0.3s;
        }

        .nav-links a:hover {
            background: var(--primary);
            color: white;
        }

        .theme-toggle {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        .card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 2rem;
            box-shadow: var(--shadow);
            margin-bottom: 2rem;
        }

        .card h1 {
            color: var(--primary);
            margin-bottom: 0.5rem;
        }

        .subtitulo {
            color: var(--text-light);
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border-color);
        }

        .buscar-alumno {
            background: var(--bg-color);
            border-radius: 15px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: bold;
        }

        .form-group input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            background: var(--card-bg);
            color: var(--text-color);
            font-size: 1rem;
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
        }

        .nivel-section {
            margin-bottom: 2rem;
        }

        .nivel-titulo {
            font-size: 1.5rem;
            color: var(--primary);
            margin-bottom: 1rem;
            padding-left: 0.5rem;
            border-left: 4px solid var(--accent);
        }

        .materiales-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1rem;
        }

        .material-card {
            background: var(--bg-color);
            border-radius: 12px;
            padding: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid var(--border-color);
        }

        .material-info {
            flex: 1;
        }

        .material-nombre {
            font-weight: bold;
            margin-bottom: 0.25rem;
        }

        .material-desc {
            font-size: 0.8rem;
            color: var(--text-light);
        }

        .btn-descargar {
            background: var(--success);
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.8rem;
            text-decoration: none;
            display: inline-block;
        }

        .info-alumno {
            background: var(--success);
            color: white;
            padding: 0.75rem;
            border-radius: 10px;
            margin-top: 1rem;
        }

        .mensaje {
            margin-top: 1rem;
            padding: 0.75rem;
            border-radius: 10px;
            text-align: center;
        }

        .exito { background: var(--success); color: white; }
        .error { background: var(--error); color: white; }
        .cargando { background: var(--warning); color: #333; }

        .bloqueado {
            text-align: center;
            padding: 2rem;
            color: var(--error);
        }

        footer {
            text-align: center;
            padding: 2rem;
            color: var(--text-light);
            border-top: 1px solid var(--border-color);
            margin-top: 2rem;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="logo" id="logoContainer">
            <span>DR</span><span>TECNO</span> 🔧
        </div>
        <div class="nav-links">
            <a href="index.html">🏠 Inicio</a>
            <a href="admin.html">⚙️ Admin</a>
            <button class="theme-toggle" id="themeToggle">🌙 Modo Oscuro</button>
        </div>
    </div>

    <div class="container">
        <div class="card">
            <h1>📚 Material de Estudio</h1>
            <div class="subtitulo">Accedé a los materiales según tu nivel</div>

            <div class="buscar-alumno">
                <h3>🔍 Identificate para ver los materiales</h3>
                <div class="form-group">
                    <label>Teléfono del alumno</label>
                    <input type="tel" id="telefonoAlumno" placeholder="Ej: 3425551234">
                </div>
                <button id="btnBuscarAlumno" class="btn">🔍 Buscar Alumno</button>
                <div id="infoAlumno"></div>
            </div>

            <div id="mensaje"></div>
        </div>

        <div class="card" id="materialesCard" style="display: none;">
            <h2>📖 Materiales Disponibles</h2>
            <div id="materialesContainer">Cargando...</div>
        </div>
    </div>

    <footer>
        <p>DR TECNO Laboratorio - Sistema de Gestión de Turnos</p>
    </footer>

    <script type="module">
        import { buscarAlumnoPorTelefono } from '../js/conexion.js';
        import { collection, getDocs, addDoc, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { db } from '../js/conexion.js';

        const MATERIALES_POR_DEFECTO = {
            inicial: [
                { nombre: "Guía de Introducción al Laboratorio", descripcion: "Normas de seguridad y uso básico", url: "#", tipo: "PDF" },
                { nombre: "Manual de Equipos Básicos", descripcion: "Uso de multímetro y osciloscopio", url: "#", tipo: "PDF" },
                { nombre: "Práctica N°1: Mediciones", descripcion: "Ejercicios de medición de magnitudes", url: "#", tipo: "PDF" }
            ],
            intermedio: [
                { nombre: "Circuitos Electrónicos", descripcion: "Análisis de circuitos de corriente continua", url: "#", tipo: "PDF" },
                { nombre: "Programación de Arduino", descripcion: "Introducción a la programación de microcontroladores", url: "#", tipo: "PDF" },
                { nombre: "Práctica N°2: Sensores", descripcion: "Uso de sensores analógicos y digitales", url: "#", tipo: "PDF" }
            ],
            avanzado: [
                { nombre: "Microcontroladores Avanzados", descripcion: "Programación de ESP32 y STM32", url: "#", tipo: "PDF" },
                { nombre: "Diseño de PCB", descripcion: "Introducción al diseño de placas de circuito impreso", url: "#", tipo: "PDF" },
                { nombre: "Proyecto Final", descripcion: "Guía para el desarrollo del proyecto integrador", url: "#", tipo: "PDF" }
            ]
        };

        const themeToggle = document.getElementById('themeToggle');
        function setTheme(theme) {
            if (theme === 'dark') {
                document.body.classList.add('dark');
                themeToggle.textContent = '☀️ Modo Claro';
                localStorage.setItem('theme', 'dark');
            } else {
                document.body.classList.remove('dark');
                themeToggle.textContent = '🌙 Modo Oscuro';
                localStorage.setItem('theme', 'light');
            }
        }
        const savedTheme = localStorage.getItem('theme');
        setTheme(savedTheme === 'dark' ? 'dark' : 'light');
        themeToggle.addEventListener('click', () => {
            const isDark = document.body.classList.contains('dark');
            setTheme(isDark ? 'light' : 'dark');
        });

        async function cargarLogo() {
            try {
                const configRef = doc(db, "configuracion", "general");
                const configSnap = await getDoc(configRef);
                if (configSnap.exists() && configSnap.data().logoBase64) {
                    document.getElementById('logoContainer').innerHTML = `<img src="${configSnap.data().logoBase64}" class="logo-img" alt="Logo">`;
                }
            } catch (error) {
                console.error("Error cargando logo:", error);
            }
        }

        let alumnoActual = null;

        async function cargarMaterialesDesdeFirestore() {
            try {
                const materialesRef = collection(db, "materiales");
                const querySnapshot = await getDocs(materialesRef);
                if (querySnapshot.empty) {
                    await guardarMaterialesDefault();
                    return MATERIALES_POR_DEFECTO;
                }
                const materiales = { inicial: [], intermedio: [], avanzado: [] };
                querySnapshot.forEach(doc => {
                    const data = doc.data();
                    if (materiales[data.nivel]) materiales[data.nivel].push({ id: doc.id, ...data });
                });
                return materiales;
            } catch (error) {
                console.error("Error cargando materiales:", error);
                return MATERIALES_POR_DEFECTO;
            }
        }

        async function guardarMaterialesDefault() {
            try {
                for (const [nivel, materiales] of Object.entries(MATERIALES_POR_DEFECTO)) {
                    for (const material of materiales) {
                        await addDoc(collection(db, "materiales"), { ...material, nivel });
                    }
                }
                console.log("Materiales por defecto guardados");
            } catch (error) {
                console.error("Error guardando materiales default:", error);
            }
        }

        function mostrarMaterialesSegunNivel(materiales, nivelAlumno) {
            const container = document.getElementById('materialesContainer');
            if (!container) return;
            let nivelesPermitidos = [];
            if (nivelAlumno === 'Inicial') nivelesPermitidos = ['inicial'];
            else if (nivelAlumno === 'Intermedio') nivelesPermitidos = ['inicial', 'intermedio'];
            else if (nivelAlumno === 'Avanzado') nivelesPermitidos = ['inicial', 'intermedio', 'avanzado'];
            else nivelesPermitidos = [];
            if (nivelesPermitidos.length === 0) {
                container.innerHTML = '<div class="bloqueado">❌ No tenés acceso a ningún material.</div>';
                return;
            }
            const nombres = { inicial: '📘 Nivel Inicial', intermedio: '📙 Nivel Intermedio', avanzado: '📕 Nivel Avanzado' };
            let html = '';
            for (const nivel of nivelesPermitidos) {
                const mats = materiales[nivel] || [];
                if (mats.length === 0) continue;
                html += `<div class="nivel-section"><div class="nivel-titulo">${nombres[nivel]}</div><div class="materiales-grid">`;
                for (const m of mats) {
                    html += `<div class="material-card"><div class="material-info"><div class="material-nombre">📄 ${m.nombre}</div><div class="material-desc">${m.descripcion}</div><div class="material-desc">Tipo: ${m.tipo || 'PDF'}</div></div><a href="${m.url}" class="btn-descargar" target="_blank">📥 Descargar</a></div>`;
                }
                html += `</div></div>`;
            }
            container.innerHTML = html || '<div class="bloqueado">📭 No hay materiales disponibles para tu nivel.</div>';
        }

        async function buscarAlumno() {
            const telefono = document.getElementById('telefonoAlumno').value.trim();
            const infoDiv = document.getElementById('infoAlumno');
            const materialesCard = document.getElementById('materialesCard');
            if (!telefono) {
                infoDiv.innerHTML = '<div class="mensaje error">⚠️ Ingresá un número de teléfono</div>';
                return;
            }
            infoDiv.innerHTML = '<div class="mensaje cargando">🔍 Buscando alumno...</div>';
            const alumno = await buscarAlumnoPorTelefono(telefono);
            if (alumno) {
                alumnoActual = alumno;
                infoDiv.innerHTML = `<div class="info-alumno">✅ Alumno: ${alumno.nombreCompleto} (Nivel: ${alumno.nivel})</div>`;
                const materiales = await cargarMaterialesDesdeFirestore();
                mostrarMaterialesSegunNivel(materiales, alumno.nivel);
                materialesCard.style.display = 'block';
            } else {
                alumnoActual = null;
                infoDiv.innerHTML = '<div class="mensaje error">❌ No se encontró ningún alumno con ese teléfono. Registrate primero.</div>';
                materialesCard.style.display = 'none';
            }
        }

        document.getElementById('btnBuscarAlumno').addEventListener('click', buscarAlumno);
        document.getElementById('telefonoAlumno').addEventListener('keypress', (e) => { if (e.key === 'Enter') buscarAlumno(); });

        cargarLogo();
    </script>
</body>
</html>
